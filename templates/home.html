<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Prediction</title>

<style>

body{

background:#f4f7fb;

font-family:Arial;

}

.container{

width:650px;

margin:40px auto;

background:white;

padding:30px;

border-radius:10px;

box-shadow:0 5px 20px rgba(0,0,0,.2);

}

h2{

text-align:center;

margin-bottom:20px;

color:#1e3c72;

}

label{

font-weight:bold;

display:block;

margin-top:15px;

}

select,input{

width:100%;

padding:10px;

margin-top:5px;

border:1px solid #ccc;

border-radius:5px;

}

button{

width:100%;

padding:12px;

margin-top:25px;

background:#1e3c72;

color:white;

border:none;

font-size:18px;

cursor:pointer;

border-radius:5px;

}

button:hover{

background:#17305c;

}

.result{

margin-top:30px;

padding:15px;

background:#e8f5e9;

text-align:center;

font-size:22px;

font-weight:bold;

color:#2e7d32;

border-radius:5px;

}

</style>

</head>

<body>

<div class="container">

<h2>Student Performance Prediction</h2>

<form action="/predictdata" method="post">

<label>Gender</label>

<select name="gender">

<option value="female">Female</option>

<option value="male">Male</option>

</select>

<label>Race / Ethnicity</label>

<select name="ethnicity">

<option value="group A">Group A</option>

<option value="group B">Group B</option>

<option value="group C">Group C</option>

<option value="group D">Group D</option>

<option value="group E">Group E</option>

</select>

<label>Parental Level of Education</label>

<select name="parental_level_of_education">

<option value="associate's degree">Associate's Degree</option>

<option value="bachelor's degree">Bachelor's Degree</option>

<option value="high school">High School</option>

<option value="master's degree">Master's Degree</option>

<option value="some college">Some College</option>

<option value="some high school">Some High School</option>

</select>

<label>Lunch</label>

<select name="lunch">

<option value="free/reduced">Free/Reduced</option>

<option value="standard">Standard</option>

</select>

<label>Test Preparation Course</label>

<select name="test_preparation_course">

<option value="completed">Completed</option>

<option value="none">None</option>

</select>

<label>Reading Score</label>

<input
type="number"
name="reading_score"
required>

<label>Writing Score</label>

<input
type="number"
name="writing_score"
required>

<button type="submit">

Predict Mathematics Score

</button>

</form>

{% if results %}

<div class="result">

Predicted Math Score : {{ results }}

</div>

{% endif %}

</div>

</body>

</html>
